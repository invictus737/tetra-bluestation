name: Build release binaries

on:
  push:
    branches:
      - main
      - feature/cross_compile
      - feature/duplex-calls-brew
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            bin_path: target/aarch64-unknown-linux-gnu/release/tetra-bluestation
            build_cmd: cross build --release --target aarch64-unknown-linux-gnu -p bluestation-bs --bin tetra-bluestation
            artifact_name: tetra-bluestation-aarch64
            pkg_config_path: /usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig

          - target: arm-unknown-linux-gnueabihf
            bin_path: target/arm-unknown-linux-gnueabihf/release/tetra-bluestation
            build_cmd: cross build --release --target arm-unknown-linux-gnueabihf -p bluestation-bs --bin tetra-bluestation
            artifact_name: tetra-bluestation-armv6
            rustflags_env: CARGO_TARGET_ARM_UNKNOWN_LINUX_GNUEABIHF_RUSTFLAGS
            cpu_rustflags: -C target-cpu=arm1176jzf-s
            pkg_config_path: /usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig

    env:
      PKG_CONFIG_ALLOW_CROSS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --locked --version 0.2.5

      - name: Generate Cross.toml
        run: |
          cat > Cross.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          pre-build = [
            "dpkg --add-architecture $CROSS_DEB_ARCH",
            "apt-get update",
            "apt-get install -y --no-install-recommends pkg-config libsoapysdr-dev:$CROSS_DEB_ARCH libasound2-dev:$CROSS_DEB_ARCH",
            "rm -rf /var/lib/apt/lists/*"
          ]

          [target.arm-unknown-linux-gnueabihf]
          pre-build = [
            "dpkg --add-architecture $CROSS_DEB_ARCH",
            "apt-get update",
            "apt-get install -y --no-install-recommends pkg-config libsoapysdr-dev:$CROSS_DEB_ARCH libasound2-dev:$CROSS_DEB_ARCH",
            "rm -rf /var/lib/apt/lists/*"
          ]
          EOF

      - name: Apply CPU-specific RUSTFLAGS
        if: matrix.cpu_rustflags != ''
        run: echo "${{ matrix.rustflags_env }}=${{ matrix.cpu_rustflags }}" >> "$GITHUB_ENV"

      - name: Set pkg-config paths
        run: |
          echo "PKG_CONFIG_PATH=${{ matrix.pkg_config_path }}" >> "$GITHUB_ENV"
          echo "TARGET_PKG_CONFIG_PATH=${{ matrix.pkg_config_path }}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_LIBDIR=${{ matrix.pkg_config_path }}" >> "$GITHUB_ENV"
          echo "TARGET_PKG_CONFIG_LIBDIR=${{ matrix.pkg_config_path }}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_SYSROOT_DIR=/" >> "$GITHUB_ENV"
          echo "TARGET_PKG_CONFIG_SYSROOT_DIR=/" >> "$GITHUB_ENV"

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Rename binary
        run: cp ${{ matrix.bin_path }} ${{ matrix.artifact_name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4.6.0
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Publish latest release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=v$VERSION-$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "name=v$VERSION-$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Download all binaries
        uses: actions/download-artifact@v4.2.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: artifacts/*
