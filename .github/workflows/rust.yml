name: Build release binaries

on:
  push:
    branches:
      - main
      - feature/cross_compile
      - feature/duplex-calls-brew
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            bin_path: target/aarch64-unknown-linux-gnu/release/tetra-bluestation
            build_cmd: cross build --release --target aarch64-unknown-linux-gnu -p bluestation-bs --bin tetra-bluestation
            artifact_name: tetra-bluestation-aarch64
            dockerfile: cross/aarch64.Dockerfile

          - target: arm-unknown-linux-gnueabihf
            bin_path: target/arm-unknown-linux-gnueabihf/release/tetra-bluestation
            build_cmd: cross build --release --target arm-unknown-linux-gnueabihf -p bluestation-bs --bin tetra-bluestation
            artifact_name: tetra-bluestation-armv6
            dockerfile: cross/armv6.Dockerfile
            rustflags_env: CARGO_TARGET_ARM_UNKNOWN_LINUX_GNUEABIHF_RUSTFLAGS
            cpu_rustflags: -C target-cpu=arm1176jzf-s

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --locked --version 0.2.5

      - name: Create cross config and custom Dockerfiles
        shell: bash
        run: |
          mkdir -p cross

          cat > Cross.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          dockerfile = "cross/aarch64.Dockerfile"

          [target.arm-unknown-linux-gnueabihf]
          dockerfile = "cross/armv6.Dockerfile"
          EOF

          cat > cross/aarch64.Dockerfile <<'EOF'
          FROM ghcr.io/cross-rs/aarch64-unknown-linux-gnu:0.2.5

          RUN apt-get update && apt-get install -y --no-install-recommends \
              pkg-config \
              libsoapysdr-dev \
              libasound2-dev \
            && rm -rf /var/lib/apt/lists/*

          ENV PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          ENV PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          ENV PKG_CONFIG_SYSROOT_DIR=/
          EOF

          cat > cross/armv6.Dockerfile <<'EOF'
          FROM ghcr.io/cross-rs/arm-unknown-linux-gnueabihf:0.2.5

          RUN dpkg --add-architecture armhf \
           && apt-get update \
           && apt-get install -y --no-install-recommends \
              pkg-config \
              libsoapysdr-dev:armhf \
              libasound2-dev:armhf \
           && rm -rf /var/lib/apt/lists/*

          ENV PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig
          ENV PKG_CONFIG_LIBDIR=/usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig
          ENV PKG_CONFIG_SYSROOT_DIR=/
          EOF

      - name: Apply CPU-specific RUSTFLAGS
        if: matrix.cpu_rustflags != ''
        run: echo "${{ matrix.rustflags_env }}=${{ matrix.cpu_rustflags }}" >> "$GITHUB_ENV"

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Rename binary
        run: cp ${{ matrix.bin_path }} ${{ matrix.artifact_name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4.6.0
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Publish latest release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=v$VERSION-$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "name=v$VERSION-$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Download all binaries
        uses: actions/download-artifact@v4.2.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: artifacts/*
